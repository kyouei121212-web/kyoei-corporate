<div class="sub-hero">
  <p class="sub-hero-en">Contact</p>
  <p class="sub-hero-ja">お問い合わせ</p>
</div>

<section class="s" id="contactSec">
  <div class="s-inner">
    <p class="contact-intro rv">以下のフォームに必要事項をご入力のうえ、送信してください。<br>内容を確認のうえ、担当者よりご連絡いたします。</p>
    <form class="form-wrap rv rv-d1" name="contact" method="POST" action="/thanks" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact">
      <p class="hidden"><label>このフィールドは入力しないでください: <input name="bot-field"></label></p>
      <div class="fg">
        <label class="fg-label" for="fType">お問い合わせ種別<span class="fg-tag fg-tag--req">必須</span></label>
        <select class="fi fi--sel" id="fType" name="種別" required>
          <option value="" disabled selected>選択してください</option>
          <option value="事業に関するお問い合わせ">事業に関するお問い合わせ</option>
          <option value="インターン応募">インターン応募</option>
          <option value="採用に関するお問い合わせ">採用に関するお問い合わせ</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="fg">
        <label class="fg-label" for="fCompany">企業名 / 大学名<span class="fg-tag fg-tag--opt">任意</span></label>
        <input type="text" class="fi" id="fCompany" name="企業名" placeholder="例）株式会社○○ / ○○大学">
      </div>
      <div class="fg">
        <label class="fg-label" for="fName">氏名<span class="fg-tag fg-tag--req">必須</span></label>
        <input type="text" class="fi" id="fName" name="氏名" placeholder="例）山田 太郎" required>
      </div>
      <div class="fg">
        <label class="fg-label" for="fKana">ふりがな<span class="fg-tag fg-tag--req">必須</span></label>
        <input type="text" class="fi" id="fKana" name="ふりがな" placeholder="例）やまだ たろう" required>
      </div>
      <div class="fg">
        <label class="fg-label" for="fEmail">メールアドレス<span class="fg-tag fg-tag--req">必須</span></label>
        <input type="email" class="fi" id="fEmail" name="メールアドレス" placeholder="例）example@email.com" required>
      </div>
      <div class="fg">
        <label class="fg-label" for="fTel">電話番号<span class="fg-tag fg-tag--opt">任意</span></label>
        <input type="tel" class="fi" id="fTel" name="電話番号" placeholder="例）03-1234-5678">
      </div>
      <div class="fg">
        <label class="fg-label" for="fBody">お問い合わせ内容<span class="fg-tag fg-tag--req">必須</span></label>
        <textarea class="fi fi--ta" id="fBody" name="お問い合わせ内容" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
      </div>
      <div class="form-privacy">
        <input type="checkbox" id="privCheck" required>
        <label for="privCheck">個人情報の取り扱いに同意の上、送信してください。お預かりした個人情報は、お問い合わせへの対応にのみ使用し、第三者への提供は行いません。</label>
      </div>
      <button class="form-btn" type="submit">送信する</button>
    </form>
  </div>
</section>
